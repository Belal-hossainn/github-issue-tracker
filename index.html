<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <!-- font awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind+daisyui  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="tailwind.config.js"></script>
    <style>
            * {
            font-family: "Poppins", sans-serif;
             }
    </style>
</head>
<body>
    <!-- LOGIN PAGE -->
<section>
    <div id="loginPage" class="flex justify-center items-center h-screen">
        <div class="card w-96 shadow-xl p-6">
            <i class="fa-brands fa-github mx-auto text-8xl my-4"></i>
            <h1 class="text-2xl font-bold text-center">GitHub Issues Tracker</h1>
            <p class="text-center text-[#64748B] mb-6">Sign in to manage your issues</p>
            <label for="username" class="mb-1 font-semibold text-[#1F2937]">Username</label>
            <input id="username" class="input input-bordered mb-3 w-full" placeholder="enter username">
            <label for="password" class="mb-1 font-semibold text-[#1F2937]">Password</label>
            <input id="password" type="password" class="input input-bordered mb-3 w-full"
             placeholder="enter password">
            <button onclick="login()" class="btn btn-primary w-full mb-3">Sign In</button>
            <div class="text-center text-sm">
                <p class=" text-[#64748B]  mt-3">Demo credentials: </p>
                <p class="text-[#64748B]">Username: <span class="font-bold">admin</span> </p>
                <p class="text-[#64748B]">Password: <span class="font-bold ">admin123</span></p>
            </div>
        </div>
    </div>
</section>
<!-- HOMEPAGE -->
<section>
    <div id="dashboard" class="hidden">
        <!-- NAVBAR -->
        <div class="navbar shadow py-4 px-2 bg-white mb-6 ">
            <div class="flex-1 ml-4 font-bold text-black text-xl">
                <i class="fa-brands fa-github mx-auto"></i>
                <span class="sm:hidden md:inline lg:inline">GitHub Issues Tracker</span>
            </div>
            <div class="flex gap-2 mr-4">
                <input id="searchText" class="input input-bordered" placeholder="Search issues">
                <button onclick="searchIssues()" class="btn btn-primary">Search</button>
            </div>
        </div>

        <!-- TABS -->
        <div  class=" lg:w-[90%] md:w-[90%] mx-auto">
            <div class="flex gap-2 p-4 bg-white shadow rounded-lg mb-4">
                <button id="allBtn" onclick="loadIssues()"
                class="btn btn-sm px-6 py-2 font-bold tab-btn btn-primary">All
                </button>
                <button id="openBtn" onclick="loadOpenIssues()"
                class="btn btn-sm px-6 py-2 font-bold tab-btn">Open
                </button>
                <button id="closedBtn" onclick="loadClosedIssues()"
                class="btn btn-sm px-6 py-2 font-bold tab-btn">Closed
            </button>
            </div>

        <!-- ISSUE COUNT CONTAINER -->
            <div class="bg-white shadow rounded-lg p-4 mb-4 flex justify-between">

                <div class="flex gap-3 items-center">
                    <div class="bg-purple-100 p-2 rounded-full">
                    <img src="./assets/icon.png" alt="Issue Icon" class="w-full h-full">
                    </div>
                    <div>
                    <h2 class="font-bold text-lg"><span id="issueCount">0</span> Issues</h2>
                    <p class="text-gray-500 text-sm">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4 text-sm items-center">
                    <span class="flex items-center gap-1"><span class="w-3 h-3 bg-green-500 rounded-full"></span>Open</span>
                    <span class="flex items-center gap-1"><span class="w-3 h-3 bg-purple-500 rounded-full"></span>Closed</span>
                </div>
            </div>

 <!-- DISPLAY ISSUES GRID -->
            <div id="issuesContainer"
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-6 bg-white shadow rounded-lg">
            </div>
        </div>
    </div>
</section>
<!-- MODAL SECTION -->
<dialog id="issueModal" class="modal">
    <div class="modal-box max-w-2xl">    
    </div>
</dialog>
<script src="/script.js"></script>
</body>
</html>
